<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeloRent Pro - Fahrradvermietung SaaS</title>
    <meta name="description" content="Cloud-basierte Software für professionelle Fahrradvermietung. Perfekt für Hotels, Tourismusbetriebe und Fahrradverleih." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="global-error-display" style="display: none; padding: 20px; background: #fee2e2; color: #991b1b; font-family: sans-serif; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
      <h3 style="margin-top: 0;">Startup Error</h3>
      <pre id="global-error-message" style="white-space: pre-wrap;"></pre>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('global-error-display').style.display = 'block';
        document.getElementById('global-error-message').textContent += `Error: ${msg}\nAt: ${url}:${line}:${col}\n\n`;
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('global-error-display').style.display = 'block';
        document.getElementById('global-error-message').textContent += `Promise Rejection: ${event.reason}\n\n`;
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
