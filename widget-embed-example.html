<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrradverleih - Jetzt buchen</title>
    
    <!-- Optional: Eigene Styles -->
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        
        .page-header {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 32px;
        }
        
        .page-header h1 {
            font-size: 32px;
            color: #1e293b;
            margin: 0 0 8px;
        }
        
        .page-header p {
            color: #64748b;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Header (optional - kann vom Hotel angepasst werden) -->
    <div class="page-header">
        <h1>🚴 Fahrradverleih</h1>
        <p>Buchen Sie Ihr Traumrad in wenigen Schritten</p>
    </div>
    
    <!-- ========================================
         VELORENT BUCHUNGS-WIDGET
         
         So betten Sie das Widget ein:
         1. Kopieren Sie diesen Container-DIV
         2. Fügen Sie das Script vor </body> ein
         3. Ersetzen Sie die API-Werte
    ======================================== -->
    
    <div id="velorent-booking"></div>
    
    <!-- VeloRent Widget Script -->
    <script type="module">
        // =============================================
        // KONFIGURATION - HIER IHRE WERTE EINTRAGEN:
        // =============================================
        
        const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";
        const API_KEY = "YOUR_PUBLIC_API_KEY"; // Aus VeloRent Dashboard → Einstellungen → Widget
        
        // =============================================
        // WIDGET LADEN (nicht ändern)
        // =============================================
        
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import React from "https://esm.sh/react@18";
        import ReactDOM from "https://esm.sh/react-dom@18/client";
        
        // Vereinfachtes Inline-Widget (für Produktion: externes Bundle nutzen)
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Widget-Komponente laden
        const container = document.getElementById("velorent-booking");
        
        // Fetch und Render
        async function initWidget() {
            try {
                // Settings laden
                const { data: settings } = await supabase.rpc("get_widget_settings", { p_api_key: API_KEY });
                
                if (settings?.error) {
                    container.innerHTML = `<div style="text-align:center;padding:40px;color:#dc2626;">Widget deaktiviert oder ungültiger API-Key</div>`;
                    return;
                }
                
                // Bikes laden
                const { data: bikes } = await supabase.rpc("get_public_bikes", { p_api_key: API_KEY });
                
                // Einfaches HTML-basiertes Widget (ohne React-Dependencies)
                renderSimpleWidget(container, settings, bikes || [], supabase, API_KEY);
                
            } catch (err) {
                console.error("VeloRent Widget Error:", err);
                container.innerHTML = `<div style="text-align:center;padding:40px;color:#dc2626;">Fehler beim Laden des Widgets</div>`;
            }
        }
        
        function renderSimpleWidget(container, settings, bikes, supabase, apiKey) {
            const primary = settings.primary_color || "#f97316";
            const radius = settings.border_radius || 12;
            
            let selectedBike = null;
            let startDate = null;
            let endDate = null;
            
            function render() {
                container.innerHTML = `
                    <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:${radius}px;box-shadow:0 4px 24px rgba(0,0,0,0.1);overflow:hidden;">
                        <!-- Header -->
                        <div style="background:linear-gradient(135deg,${primary},${settings.secondary_color || '#fbbf24'});padding:24px;color:white;">
                            <h2 style="margin:0 0 8px;font-size:20px;">🚴 ${settings.organization_name || 'Fahrradverleih'}</h2>
                            <p style="margin:0;opacity:0.9;font-size:14px;">${settings.welcome_text || 'Buchen Sie Ihr Fahrrad'}</p>
                        </div>
                        
                        <!-- Bikes -->
                        <div style="padding:24px;">
                            <h3 style="margin:0 0 16px;font-size:16px;font-weight:600;">Fahrrad wählen</h3>
                            <div style="display:flex;flex-direction:column;gap:12px;">
                                ${bikes.map(bike => `
                                    <div 
                                        onclick="window.selectBike('${bike.id}')"
                                        style="border:2px solid ${selectedBike === bike.id ? primary : '#e2e8f0'};
                                               background:${selectedBike === bike.id ? primary + '10' : 'transparent'};
                                               border-radius:${radius}px;
                                               padding:16px;
                                               cursor:pointer;
                                               transition:all 0.2s;">
                                        <div style="display:flex;justify-content:space-between;">
                                            <div>
                                                <strong>${bike.name}</strong>
                                                <div style="font-size:13px;color:#64748b;">${bike.category} • ${bike.size}</div>
                                            </div>
                                            <div style="text-align:right;">
                                                <div style="font-weight:700;color:${primary};">${new Intl.NumberFormat('de-DE', {style:'currency',currency:'EUR'}).format(bike.price_per_day)}</div>
                                                <div style="font-size:11px;color:#94a3b8;">pro Tag</div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            ${bikes.length === 0 ? '<p style="text-align:center;color:#64748b;padding:32px;">Derzeit keine Räder verfügbar</p>' : ''}
                            
                            <!-- Date Selection -->
                            ${selectedBike ? `
                                <div style="margin-top:24px;">
                                    <h3 style="margin:0 0 16px;font-size:16px;font-weight:600;">Zeitraum wählen</h3>
                                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                        <div>
                                            <label style="display:block;font-size:13px;color:#64748b;margin-bottom:4px;">Von</label>
                                            <input type="date" id="vr-start" onchange="window.updateDates()" 
                                                   min="${new Date().toISOString().slice(0,10)}"
                                                   style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                                        </div>
                                        <div>
                                            <label style="display:block;font-size:13px;color:#64748b;margin-bottom:4px;">Bis</label>
                                            <input type="date" id="vr-end" onchange="window.updateDates()"
                                                   style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                                        </div>
                                    </div>
                                    <div id="vr-availability" style="margin-top:16px;"></div>
                                </div>
                            ` : ''}
                            
                            <!-- Customer Form (shown when dates selected) -->
                            <div id="vr-form-container"></div>
                            
                            <!-- Result -->
                            <div id="vr-result"></div>
                        </div>
                        
                        <div style="padding:16px 24px;border-top:1px solid #e2e8f0;text-align:center;font-size:11px;color:#94a3b8;">
                            Powered by VeloRent Pro
                        </div>
                    </div>
                `;
            }
            
            // Global functions for onclick handlers
            window.selectBike = (id) => {
                selectedBike = id;
                startDate = null;
                endDate = null;
                render();
            };
            
            window.updateDates = async () => {
                const start = document.getElementById('vr-start').value;
                const end = document.getElementById('vr-end').value;
                
                if (!start || !end) return;
                
                const availDiv = document.getElementById('vr-availability');
                availDiv.innerHTML = '<div style="color:#64748b;">Prüfe Verfügbarkeit...</div>';
                
                const { data } = await supabase.rpc("check_availability", {
                    p_api_key: apiKey,
                    p_bike_id: selectedBike,
                    p_start_date: start,
                    p_end_date: end
                });
                
                if (data?.available) {
                    startDate = start;
                    endDate = end;
                    availDiv.innerHTML = `
                        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:16px;">
                            <div style="display:flex;align-items:center;gap:8px;color:#16a34a;margin-bottom:8px;">
                                <span style="font-size:18px;">✓</span>
                                <strong>Verfügbar!</strong>
                            </div>
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:#64748b;">Dauer: ${data.total_days} Tage</span>
                                <span style="font-weight:700;color:${primary};font-size:18px;">${new Intl.NumberFormat('de-DE', {style:'currency',currency:'EUR'}).format(data.total_price)}</span>
                            </div>
                        </div>
                    `;
                    
                    // Show form
                    document.getElementById('vr-form-container').innerHTML = `
                        <div style="margin-top:24px;">
                            <h3 style="margin:0 0 16px;font-size:16px;font-weight:600;">Ihre Daten</h3>
                            <div style="display:flex;flex-direction:column;gap:12px;">
                                <input type="text" id="vr-name" placeholder="Ihr Name *" required
                                       style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                                ${settings.require_email !== false ? `
                                    <input type="email" id="vr-email" placeholder="E-Mail ${settings.require_email ? '*' : ''}"
                                           style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                                ` : ''}
                                ${settings.require_phone !== false ? `
                                    <input type="tel" id="vr-phone" placeholder="Telefon ${settings.require_phone ? '*' : ''}"
                                           style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;">
                                ` : ''}
                                <textarea id="vr-notes" placeholder="Anmerkungen (optional)" rows="2"
                                          style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;resize:vertical;"></textarea>
                                
                                <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;">
                                    <input type="checkbox" id="vr-terms" style="margin-top:4px;">
                                    <span style="font-size:13px;color:#475569;">
                                        Ich akzeptiere die ${settings.terms_url ? `<a href="${settings.terms_url}" target="_blank" style="color:${primary}">AGB</a>` : 'AGB'} 
                                        und ${settings.privacy_url ? `<a href="${settings.privacy_url}" target="_blank" style="color:${primary}">Datenschutzerklärung</a>` : 'Datenschutzerklärung'}.
                                    </span>
                                </label>
                                
                                <button onclick="window.submitBooking()" id="vr-submit-btn"
                                        style="background:linear-gradient(135deg,${primary},${settings.secondary_color || '#fbbf24'});
                                               color:white;border:none;border-radius:${radius}px;padding:14px 24px;
                                               font-weight:600;font-size:16px;cursor:pointer;margin-top:8px;">
                                    ✓ Jetzt verbindlich buchen
                                </button>
                            </div>
                        </div>
                    `;
                    
                } else {
                    availDiv.innerHTML = `
                        <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;color:#dc2626;">
                            ✗ ${data?.error || 'Nicht verfügbar'}
                        </div>
                    `;
                    document.getElementById('vr-form-container').innerHTML = '';
                }
            };
            
            window.submitBooking = async () => {
                const name = document.getElementById('vr-name')?.value;
                const email = document.getElementById('vr-email')?.value;
                const phone = document.getElementById('vr-phone')?.value;
                const notes = document.getElementById('vr-notes')?.value;
                const terms = document.getElementById('vr-terms')?.checked;
                
                if (!name || name.length < 2) {
                    alert('Bitte geben Sie Ihren Namen ein');
                    return;
                }
                
                if (!terms) {
                    alert('Bitte akzeptieren Sie die AGB');
                    return;
                }
                
                const btn = document.getElementById('vr-submit-btn');
                btn.disabled = true;
                btn.textContent = 'Wird gebucht...';
                
                try {
                    const { data } = await supabase.rpc("create_public_booking", {
                        p_api_key: apiKey,
                        p_bike_id: selectedBike,
                        p_start_date: startDate,
                        p_end_date: endDate,
                        p_customer_name: name,
                        p_customer_email: email || null,
                        p_customer_phone: phone || null,
                        p_notes: notes || null
                    });
                    
                    if (data?.success) {
                        document.getElementById('vr-form-container').innerHTML = '';
                        document.getElementById('vr-availability').innerHTML = '';
                        document.getElementById('vr-result').innerHTML = `
                            <div style="text-align:center;padding:32px 0;">
                                <div style="width:64px;height:64px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;">
                                    ✓
                                </div>
                                <h3 style="color:#16a34a;margin:0 0 8px;">Buchung erfolgreich!</h3>
                                <p style="color:#64748b;margin:0 0 24px;">${data.message || settings.success_text}</p>
                                <div style="background:#f8fafc;border-radius:12px;padding:20px;display:inline-block;">
                                    <div style="color:#64748b;font-size:12px;margin-bottom:4px;">Buchungsnummer</div>
                                    <div style="font-size:24px;font-weight:700;color:${primary};letter-spacing:2px;">${data.booking_number}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        throw new Error(data?.error || 'Buchung fehlgeschlagen');
                    }
                } catch (err) {
                    alert(err.message);
                    btn.disabled = false;
                    btn.textContent = '✓ Jetzt verbindlich buchen';
                }
            };
            
            render();
        }
        
        // Start
        initWidget();
    </script>
</body>
</html>
