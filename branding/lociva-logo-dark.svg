<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- LOCIVA Logo: Light variant for dark backgrounds -->
  <rect width="400" height="120" fill="#1E2D26"/>
  
  <text x="200" y="60" 
    text-anchor="middle" 
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" 
    font-size="48" 
    font-weight="300" 
    letter-spacing="8" 
    fill="#D4EDE2"
    text-rendering="geometricPrecision">LOCIVA</text>
  
  <text x="200" y="88" 
    text-anchor="middle" 
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" 
    font-size="13" 
    font-weight="400" 
    letter-spacing="0.5" 
    fill="#8AAA9A"
    text-rendering="geometricPrecision">Local experiences, one scan away.</text>
</svg>
