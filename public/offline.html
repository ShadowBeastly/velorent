<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VeloRent Pro — Offline</title>
    <style>
        body { font-family: system-ui; background: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #f97316, #f59e0b); color: white; border: none; border-radius: 0.75rem; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Keine Internetverbindung</h1>
        <p>Bitte prüfen Sie Ihre Verbindung und versuchen Sie es erneut.</p>
        <button onclick="location.reload()">Erneut versuchen</button>
    </div>
</body>
</html>
